---
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
      - id: ruff-format
        args:
          - --preview
        types_or:
          - jupyter
          - markdown
          - pyi
          - python
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - numpy
          - pydantic
